name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site with cache-busting
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            ./ _site/

          sed -i "s|href=\"css/style.css\"|href=\"css/style.css?v=${GITHUB_SHA}\"|g" _site/index.html
          sed -i "s|src=\"js/app.js\"|src=\"js/app.js?v=${GITHUB_SHA}\"|g" _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
